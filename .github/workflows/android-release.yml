name: Android Binary Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from for manual dispatch"
        required: false
        default: "main"
        type: string
      build_aab:
        description: "Build split AAB artifacts (optional)"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      branch: ${{ steps.resolve.outputs.branch }}
    steps:
      - name: Resolve version tag
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            BRANCH=""
          else
            TAG=$(gh release view --repo "${{ github.repository }}" --json tagName -q '.tagName')
            if [ -z "${TAG}" ]; then
              echo "Unable to resolve latest GitHub release tag for workflow_dispatch"
              exit 1
            fi
            BRANCH="${{ inputs.branch }}"
            if [ -z "${BRANCH}" ]; then
              BRANCH="main"
            fi
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG}"
          if [ -n "${BRANCH}" ]; then
            echo "Resolved branch: ${BRANCH}"
          fi

  cleanup-android-assets:
    needs: resolve-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ needs.resolve-tag.outputs.tag }}
    steps:
      - name: Remove existing android assets on workflow_dispatch
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Not workflow_dispatch; skipping android asset cleanup"
            exit 0
          fi

          mapfile -t ASSETS < <(gh release view "$TAG" \
            --repo "${{ github.repository }}" \
            --json assets \
            -q '.assets[].name' | grep -E '^(opendronelog-sync_.*_android.*\.apk|opendronelog-sync_.*\.aab)$' || true)

          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "No existing Android assets to remove"
            exit 0
          fi

          for name in "${ASSETS[@]}"; do
            echo "Removing old Android asset: $name"
            gh release delete-asset "$TAG" "$name" \
              --repo "${{ github.repository }}" \
              --yes
          done

  build-android:
    needs: [resolve-tag, cleanup-android-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && needs.resolve-tag.outputs.branch || needs.resolve-tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install dependencies
        run: npm ci

      - name: Ensure Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Initialize Android project
        run: |
          set -euo pipefail
          if [ ! -d "src-tauri/gen/android" ]; then
            npm run tauri android init -- --ci
          else
            echo "Android project already initialized"
          fi

      - name: Sync Android launcher icons
        run: npm run mobile:android:sync-icons

      - name: Build release APKs (universal and split)
        id: build_apks
        run: |
          set -euo pipefail
          LOG_PATH="$RUNNER_TEMP/android-build.log"
          echo "build_log=$LOG_PATH" >> "$GITHUB_OUTPUT"

          npm run tauri android build -- --apk 2>&1 | tee "$LOG_PATH"
          npm run tauri android build -- --apk --split-per-abi 2>&1 | tee -a "$LOG_PATH"

      - name: Build release AABs (split per ABI)
        if: ${{ inputs.build_aab }}
        run: |
          set -euo pipefail
          npm run tauri android build -- --aab --split-per-abi

      - name: Ensure Android signing tools
        run: |
          set -euo pipefail

          sdkmanager --install "build-tools;35.0.0"

          BUILD_TOOLS_DIR=$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n1)
          if [ -z "${BUILD_TOOLS_DIR:-}" ]; then
            echo "Unable to locate Android build-tools directory under $ANDROID_HOME/build-tools"
            exit 1
          fi

          if [ ! -x "$BUILD_TOOLS_DIR/zipalign" ] || [ ! -x "$BUILD_TOOLS_DIR/apksigner" ]; then
            echo "zipalign/apksigner not found in $BUILD_TOOLS_DIR"
            exit 1
          fi

          echo "$BUILD_TOOLS_DIR" >> "$GITHUB_PATH"
          "$BUILD_TOOLS_DIR/apksigner" --version >/dev/null

      - name: Sign release APKs (universal and split)
        id: sign_apks
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ] || [ -z "${ANDROID_KEY_ALIAS:-}" ] || [ -z "${ANDROID_KEYSTORE_PASSWORD:-}" ]; then
            echo "Missing required signing secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEY_ALIAS, ANDROID_KEYSTORE_PASSWORD"
            exit 1
          fi

          KEY_PASSWORD="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
          TAG="${{ needs.resolve-tag.outputs.tag }}"
          KEYSTORE_PATH="$RUNNER_TEMP/upload-keystore.jks"
          SIGNED_DIR="$RUNNER_TEMP/signed-apks"
          APK_OUTPUT_DIR="src-tauri/gen/android/app/build/outputs/apk"

          ZIPALIGN_BIN=$(command -v zipalign || true)
          APKSIGNER_BIN=$(command -v apksigner || true)
          if [ -z "$ZIPALIGN_BIN" ] || [ -z "$APKSIGNER_BIN" ]; then
            BUILD_TOOLS_DIR=$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n1)
            ZIPALIGN_BIN="$BUILD_TOOLS_DIR/zipalign"
            APKSIGNER_BIN="$BUILD_TOOLS_DIR/apksigner"
          fi

          if [ ! -x "$ZIPALIGN_BIN" ] || [ ! -x "$APKSIGNER_BIN" ]; then
            echo "Could not resolve zipalign/apksigner binaries"
            exit 1
          fi

          mkdir -p "$SIGNED_DIR"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"

          mapfile -t UNSIGNED_APKS < <(find "$APK_OUTPUT_DIR" -type f -name '*-unsigned.apk' | sort)
          if [ "${#UNSIGNED_APKS[@]}" -eq 0 ]; then
            echo "No unsigned APKs were found in $APK_OUTPUT_DIR"
            exit 1
          fi

          for UNSIGNED_APK in "${UNSIGNED_APKS[@]}"; do
            BASE_NAME=$(basename "$UNSIGNED_APK")
            APK_VARIANT=$(echo "$UNSIGNED_APK" | sed -E 's#.*?/apk/([^/]+)/.*#\1#')
            if [ "$APK_VARIANT" = "$UNSIGNED_APK" ]; then
              APK_VARIANT="unknown"
            fi

            ALIGNED_APK="$RUNNER_TEMP/aligned-${BASE_NAME/-unsigned.apk/.apk}"

            if [[ "$BASE_NAME" == *universal* ]] || [[ "$APK_VARIANT" == universal ]]; then
              OUTPUT_NAME="opendronelog-sync_${TAG}_android-universal.apk"
            else
              OUTPUT_NAME="opendronelog-sync_${TAG}_${APK_VARIANT}_android.apk"
            fi

            OUTPUT_APK="$SIGNED_DIR/$OUTPUT_NAME"

            "$ZIPALIGN_BIN" -p -f 4 "$UNSIGNED_APK" "$ALIGNED_APK"

            "$APKSIGNER_BIN" sign \
              --ks "$KEYSTORE_PATH" \
              --ks-key-alias "$ANDROID_KEY_ALIAS" \
              --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
              --key-pass "pass:$KEY_PASSWORD" \
              --out "$OUTPUT_APK" \
              "$ALIGNED_APK"

            "$APKSIGNER_BIN" verify --verbose "$OUTPUT_APK"
          done

          echo "signed_dir=$SIGNED_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload signed APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release-all-signed
          path: |
            ${{ steps.sign_apks.outputs.signed_dir }}/*.apk

      - name: Upload split AAB artifacts
        if: ${{ inputs.build_aab }}
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-release-split
          path: |
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release exists for $TAG"
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --verify-tag \
              --title "OpenDronelog Sync $TAG" \
              --notes "Automated Android release assets for $TAG"
          fi

      - name: Upload signed APKs to release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" \
            "${{ steps.sign_apks.outputs.signed_dir }}"/*.apk \
            --repo "${{ github.repository }}" \
            --clobber
